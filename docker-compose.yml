services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_MAP_STYLE_URL: ${NEXT_PUBLIC_MAP_STYLE_URL:-https://basemaps.cartocdn.com/gl/positron-gl-style/style.json}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-biogt-local-dev-secret-change-me}
      BIOGT_BOOTSTRAP_DEMO_DATA: ${BIOGT_BOOTSTRAP_DEMO_DATA:-false}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/biogt}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-biogt-submissions}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-minioadmin}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-minioadmin123}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
    depends_on:
      db-init:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: biogt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d biogt"]
      interval: 2s
      timeout: 5s
      retries: 30

  db-init:
    image: postgis/postgis:16-3.4
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: biogt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./infra/supabase/migrations:/migrations:ro
      - ./infra/scripts/apply-migrations.sh:/scripts/apply-migrations.sh:ro
    command: ["/bin/sh", "/scripts/apply-migrations.sh"]

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123}; do
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/${S3_BUCKET:-biogt-submissions};
      exit 0;
      "

volumes:
  postgres_data:
  minio_data:
